<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Compare gym equipment prices across top retailers. Find the best deals on barbells, power racks, bumper plates, and more — updated daily.{% endblock %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">💪 {{ site_name }}</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navmenu">
      <ul class="navbar-nav me-auto">
        {% for cat in categories %}
        <li class="nav-item">
          <a class="nav-link" href="/category/{{ cat }}">{{ cat }}</a>
        </li>
        {% endfor %}
      </ul>
      <form class="d-flex" action="/search" method="get">
        <input class="form-control me-2" type="search" name="q" placeholder="Search equipment...">
        <button class="btn btn-outline-light" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer class="bg-dark text-light py-4 mt-5">
  <div class="container text-center small">
    <p class="mb-1">Prices updated daily. As an affiliate we may earn commissions from qualifying purchases.</p>
    <p class="mb-0 text-muted">© {{ site_name }} {{ 2024 }}</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
